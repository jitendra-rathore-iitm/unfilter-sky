<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unfiltered-Sky</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input type="text" placeholder="enter city name" spellcheck="false" />
        <button><img src="images/button.png" /></button>
      </div>

      <div class="error">
        <p>Invalid City Name</p>
      </div>

      <div class="weather">
        <img src="images/rain.png" class="weather-icon" />
        <h1 class="temp">22°C</h1>
        <h2 class="city">New York</h2>
        <div class="type">Clear</div>
        <div class="details">
          <div class="col">
            <img src="images/aqi.png" />
            <div>
              <p class="aqi">15</p>
              <p>AQI</p>
            </div>
          </div>

          <div class="col">
            <img src="images/humidity.png" />
            <div>
              <p class="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>

          <div class="col">
            <img src="images/wind.png" />
            <div>
              <p class="wind">15 km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer>
      <div class="end">
        <p>Made with ❤️ by Jitendra Rathore</p>
      </div>
    </footer>
  </body>

  <script>
    const apiKey = "f91184191a2a1f61ada2c10665d693e5";
    const apiURL =
      "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";
    const aqiURL = "http://api.openweathermap.org/data/2.5/air_pollution?";

    const searchBox = document.querySelector(".search input");
    const searchBtn = document.querySelector(".search button");
    const weatherIcon = document.querySelector(".weather-icon");

    async function checkweather(city) {
      const response = await fetch(apiURL + city + `&appid=${apiKey}`);

      if (response.status == 404) {
        document.querySelector(".error").style.display = "block";
        document.querySelector(".weather").style.display = "none";
      } else {
        var data = await response.json();

        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".temp").innerHTML =
          Math.round(data.main.temp) + "°C";
        document.querySelector(".humidity").innerHTML =
          data.main.humidity + "%";
        document.querySelector(".wind").innerHTML =
          Math.round(data.wind.speed * 3.6) + "Km/h";
        document.querySelector(".type").innerHTML = data.weather[0].main;

        checkaqi(data.coord.lat, data.coord.lon);

        if (data.weather[0].main == "Clouds") {
          weatherIcon.src = "images/clouds.png";
        } else if (data.weather[0].main == "Rain") {
          weatherIcon.src = "images/rain.png";
        } else if (data.weather[0].main == "Snow") {
          weatherIcon.src = "images/snow.png";
        } else if (data.weather[0].main == "Humidity") {
          weatherIcon.src = "images/humidity.png";
        } else if (data.weather[0].main == "Drizzle") {
          weatherIcon.src = "images/drizzle.png";
        } else if (data.weather[0].main == "Mist") {
          weatherIcon.src = "images/mist.png";
        } else if (data.weather[0].main == "Wind") {
          weatherIcon.src = "images/Wind.png";
        } else {
          weatherIcon.src = "images/sun.png";
        }

        document.querySelector(".weather").style.display = "block";
        document.querySelector(".error").style.display = "none";
      }
    }

    async function checkaqi(lat, lon) {
      const response = await fetch(
        aqiURL + `lat=${lat}` + `&lon=${lon}` + `&appid=${apiKey}`,
      );
      const data = await response.json();
      const aqi = data.list[0].main.aqi;
      const aqiLabel = ["", "Good", "Fair", "Moderate", "Poor", "Very Poor"];
      document.querySelector(".aqi").innerHTML = `${aqi} + (${aqiLabel[aqi]})`;
    }

    searchBtn.addEventListener("click", () => {
      checkweather(searchBox.value);
    });
  </script>
</html>
